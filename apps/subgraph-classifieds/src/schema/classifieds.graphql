extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.6", import: ["@key", "@external", "@extends", "@provides", "@shareable"])

# ─── Scalars & Enums ──────────────────────────────────────────────────────────

scalar DateTime

enum RoleType {
  PAID
  VOLUNTEER
  INTERNSHIP
}

enum WorkLocation {
  PHYSICAL
  REMOTE
  HYBRID
}

enum JobStatus {
  ACTIVE
  ARCHIVED
  CLOSED
}

enum JobSort {
  NEWEST
  DEADLINE
  SALARY_ASC
  SALARY_DESC
  POPULAR
}

enum ItemCondition {
  NEW
  LIKE_NEW
  GOOD
  FAIR
}

enum ListingStatus {
  AVAILABLE
  RESERVED
  SOLD
  PENDING_REVIEW
  REMOVED
}

enum MarketplaceSort {
  NEWEST
  PRICE_ASC
  PRICE_DESC
  POPULAR
}

enum MessageThreadStatus { ACTIVE ARCHIVED BLOCKED }
enum MessageType { TEXT SYSTEM OFFER }
enum MessageParticipantRole { BUYER SELLER }

# ─── Federation Entity Stubs ──────────────────────────────────────────────────

type User @key(fields: "id") @key(fields: "firebaseUid") @extends {
  id: ID! @external
  firebaseUid: String! @external
  jobApplications: [JobApplication!]!
  marketplaceListings: [MarketplaceItem!]!
  savedJobs: [JobListing!]!
}

type Organisation @key(fields: "id") @extends {
  id: ID! @external
  jobListings: [JobListing!]!
  marketplaceListings: [MarketplaceItem!]!
}

# ─── Entities ─────────────────────────────────────────────────────────────────

type JobListing @key(fields: "id") {
  id: ID!
  title: String!
  description: String!
  organisation: Organisation!
  roleType: RoleType!
  workLocation: WorkLocation!
  skillsRequired: [String!]!
  region: String!
  salaryRange: SalaryRange
  applicationDeadline: DateTime!
  externalApplyUrl: String
  status: JobStatus!
  isPromoted: Boolean!
  faithAlignmentTag: FaithAlignmentTag
  responsibilities: [String!]!
  educationalRequirement: String
  experience: String
  certifications: String
  otherSkills: String
  faithDescription: String
  keyFaithRequirements: [String!]!
  applicationCount: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type SalaryRange @shareable {
  min: Float!
  max: Float!
  currency: String!
}

enum FaithAlignmentTag {
  OPEN_TO_ALL
  FAITH_BACKGROUND_PREFERRED
}

type JobApplication @key(fields: "id") {
  id: ID!
  listing: JobListing!
  applicant: User!
  status: ApplicationStatus!
  experience: String
  resumeUrl: String
  cvUrl: String
  fullName: String!
  phoneNumber: String
  email: String!
  gender: String
  dateOfBirth: DateTime
  education: [EducationEntry!]!
  yearsOfExperience: Float
  currentSalary: String
  expectedSalary: String
  portfolioUrl: String
  linkedInProfile: String
  acknowledged: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type EducationEntry {
  highestQualification: String
  institutionName: String
  yearOfEnrollment: Int
  yearOfCompletion: Int
  marksGrades: String
  degreeType: String
}

enum ApplicationStatus {
  SUBMITTED
  UNDER_REVIEW
  SHORTLISTED
  HIRED
  REJECTED
  WITHDRAWN
}

type MarketplaceItem @key(fields: "id") {
  id: ID!
  title: String!
  description: String!
  seller: User!
  price: Float!
  currency: String!
  condition: ItemCondition!
  category: MarketplaceCategory!
  area: String
  region: String!
  imageUrls: [String!]!
  status: ListingStatus!
  isDonation: Boolean!
  isPromoted: Boolean!
  flagCount: Int!
  convertedPrice: ConvertedPrice
  subCategory: String
  dimensions: String
  otherAttributes: String
  maxRetailPrice: Float
  contactInfo: String
  showContactOnOffer: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
}

enum MarketplaceCategory {
  ELECTRONICS
  CLOTHING
  BOOKS
  FURNITURE
  FOOD
  BABY_AND_KIDS
  CHARITY_ITEMS
  OTHER
}

type ConvertedPrice @shareable {
  original: Float!
  originalCurrency: String!
  converted: Float!
  toCurrency: String!
  isEstimate: Boolean!
}

type MessageThread @key(fields: "id") {
  id: ID!
  listing: MarketplaceItem!
  buyer: User!
  seller: User!
  organisation: Organisation
  status: MessageThreadStatus!
  lastMessage: String
  lastMessageAt: DateTime
  unreadCount: Int!
  messages(limit: Int, before: String): MessageConnection!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Message @key(fields: "id") {
  id: ID!
  thread: MessageThread!
  sender: User!
  type: MessageType!
  body: String!
  readAt: DateTime
  createdAt: DateTime!
}

type MessageConnection { edges: [Message!]! hasNextPage: Boolean! endCursor: String }
type MessageThreadConnection { edges: [MessageThread!]! hasNextPage: Boolean! endCursor: String }

# ─── Queries ──────────────────────────────────────────────────────────────────

type Query {
  jobListing(id: ID!): JobListing
  myJobApplication(jobId: ID!): JobApplication
  organisationJobApplications(organisationId: ID!, jobId: ID, status: ApplicationStatus): [JobApplication!]!
  mySavedJobs: [JobListing!]!
  mySavedMarketplaceItems: [MarketplaceItem!]!
  isJobSaved(id: ID!): Boolean!
  isMarketplaceItemSaved(id: ID!): Boolean!
  myMessageThreads(role: MessageParticipantRole, limit: Int, after: String): MessageThreadConnection!
  messageThread(id: ID!): MessageThread
  unreadMessageCount: Int!
  jobListings(
    region: String
    search: String
    roleType: RoleType
    workLocation: WorkLocation
    skillTags: [String!]
    minSalary: Float
    maxSalary: Float
    status: JobStatus
    sort: JobSort
    limit: Int
    after: String
  ): JobListingConnection!

  marketplaceItem(id: ID!): MarketplaceItem
  marketplaceItems(
    region: String
    search: String
    category: MarketplaceCategory
    condition: ItemCondition
    subCategory: String
    minPrice: Float
    maxPrice: Float
    isDonation: Boolean
    status: ListingStatus
    sort: MarketplaceSort
    limit: Int
    after: String
  ): MarketplaceItemConnection!

  communityGives(region: String, limit: Int): [MarketplaceItem!]!
  classifiedOrganisationNotifications(organisationId: ID!, unreadOnly: Boolean, limit: Int): [ClassifiedOrganisationNotification!]!
  classifiedOrganisationUnreadCount(organisationId: ID!): Int!
}

type JobListingConnection {
  edges: [JobListing!]!
  hasNextPage: Boolean!
  endCursor: String
}

type MarketplaceItemConnection {
  edges: [MarketplaceItem!]!
  hasNextPage: Boolean!
  endCursor: String
}

type ClassifiedOrganisationNotification { id: ID! type: String! title: String! message: String! href: String sourceId: String readAt: DateTime createdAt: DateTime! }

# ─── Mutations ────────────────────────────────────────────────────────────────

type Mutation {
  createJobListing(input: CreateJobListingInput!): JobListing!
  updateJobListing(id: ID!, input: UpdateJobListingInput!): JobListing!
  archiveJobListing(id: ID!): JobListing!
  submitJobApplication(input: SubmitJobApplicationInput!): JobApplication!
  updateJobApplicationStatus(id: ID!, status: ApplicationStatus!): JobApplication!

  createMarketplaceItem(input: CreateMarketplaceItemInput!): MarketplaceItem!
  updateMarketplaceItem(id: ID!, input: UpdateMarketplaceItemInput!): MarketplaceItem!
  deleteMarketplaceItem(id: ID!): Boolean!
  updateMarketplaceItemStatus(id: ID!, status: ListingStatus!): MarketplaceItem!

  reportListing(itemId: ID!, reason: String!): Boolean!
  saveJob(id: ID!): Boolean!
  unsaveJob(id: ID!): Boolean!
  saveMarketplaceItem(id: ID!): Boolean!
  unsaveMarketplaceItem(id: ID!): Boolean!
  startListingConversation(listingId: ID!, message: String!): MessageThread!
  sendMessage(threadId: ID!, body: String!): Message!
  markThreadRead(threadId: ID!): Boolean!
  archiveThread(threadId: ID!): MessageThread!
  markClassifiedOrganisationNotificationRead(id: ID!): ClassifiedOrganisationNotification!
  markAllClassifiedOrganisationNotificationsRead(organisationId: ID!): Boolean!
}

# ─── Inputs ───────────────────────────────────────────────────────────────────

input CreateJobListingInput {
  title: String!
  description: String!
  organisationId: ID!
  roleType: RoleType!
  workLocation: WorkLocation!
  skillsRequired: [String!]!
  region: String!
  salaryRange: SalaryRangeInput
  applicationDeadline: DateTime!
  externalApplyUrl: String
  faithAlignmentTag: FaithAlignmentTag
}

input UpdateJobListingInput {
  title: String
  description: String
  roleType: RoleType
  workLocation: WorkLocation
  skillsRequired: [String!]
  salaryRange: SalaryRangeInput
  applicationDeadline: DateTime
  externalApplyUrl: String
}

input SalaryRangeInput {
  min: Float!
  max: Float!
  currency: String!
}

input EducationEntryInput {
  highestQualification: String
  institutionName: String
  yearOfEnrollment: Int
  yearOfCompletion: Int
  marksGrades: String
  degreeType: String
}

input SubmitJobApplicationInput {
  jobId: ID!
  fullName: String!
  phoneNumber: String
  email: String!
  gender: String
  dateOfBirth: DateTime
  education: [EducationEntryInput!]!
  experienceDescription: String
  yearsOfExperience: Float
  currentSalary: String
  expectedSalary: String
  portfolioUrl: String
  linkedInProfile: String
  acknowledged: Boolean!
}

input CreateMarketplaceItemInput {
  organisationId: ID
  title: String!
  description: String!
  price: Float!
  currency: String!
  condition: ItemCondition!
  category: MarketplaceCategory!
  area: String
  region: String!
  imageUrls: [String!]!
  isDonation: Boolean!
}

input UpdateMarketplaceItemInput {
  title: String
  description: String
  price: Float
  currency: String
  condition: ItemCondition
  category: MarketplaceCategory
  region: String
  imageUrls: [String!]
  isDonation: Boolean
}
