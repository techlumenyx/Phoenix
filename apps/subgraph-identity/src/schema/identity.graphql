extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.6", import: ["@key", "@shareable"])

# ─── Scalars & Enums ──────────────────────────────────────────────────────────

scalar DateTime

enum VerificationTier {
  NONE
  STANDARD
  CHARITY
  NGO
}

enum ProfileVisibility {
  PUBLIC
  MEMBERS_ONLY
  PRIVATE
}

# ─── Entities ─────────────────────────────────────────────────────────────────

type User @key(fields: "id") @key(fields: "firebaseUid") {
  id: ID!
  firebaseUid: String!
  email: String!
  name: String!
  region: String!
  isVerified: Boolean!
  onboardingCompleted: Boolean!
  preferences: [String!]!
  roles: [String!]!
  orgId: ID
  avatarUrl: String
  bio: String
  socialLinks: SocialLinks
  privacySettings: ProfilePrivacySettings!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Organisation @key(fields: "id") {
  id: ID!
  name: String! @shareable
  description: String
  logoUrl: String
  region: String
  isVerified: Boolean! @shareable
  verificationTier: VerificationTier!
  followerCount: Int!
  websiteUrl: String
  contactEmail: String
  phoneNumber: String
  socialLinks: SocialLinks
  isActive: Boolean!
  deactivatedAt: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
}

type SocialLinks @shareable {
  whatsapp: String
  instagram: String
  facebook: String
  twitter: String
  website: String
}

type ProfilePrivacySettings {
  profileVisibility: ProfileVisibility!
  showAvatar: Boolean!
  showRegion: Boolean!
  showBio: Boolean!
  showSocialLinks: Boolean!
}

type FollowRelationship @key(fields: "id") {
  id: ID!
  follower: User!
  organisation: Organisation!
  createdAt: DateTime!
}

type OrganisationTeamMember { user: User! roles: [String!]! joinedAt: DateTime }
type OrganisationInvite { id: ID! email: String! organisation: Organisation! roles: [String!]! status: String! token: String! expiresAt: DateTime! createdAt: DateTime! }
type IdentityOrganisationNotification { id: ID! type: String! title: String! message: String! href: String sourceId: String readAt: DateTime createdAt: DateTime! }

type VerificationRequest @key(fields: "id") {
  id: ID!
  organisation: Organisation!
  status: VerificationStatus!
  documentsUrls: [String!]!
  submittedAt: DateTime!
  reviewedAt: DateTime
  rejectionReason: String
}

enum VerificationStatus {
  PENDING
  APPROVED
  REJECTED
}

# ─── Queries ──────────────────────────────────────────────────────────────────

type Query {
  me: User
  user(id: ID!): User
  organisation(id: ID!): Organisation
  organisations(region: String, search: String, limit: Int, after: String): OrganisationConnection!
  myOrganisations: [Organisation!]!
  myFollowingOrganisations: [Organisation!]!
  isFollowingOrganisation(organisationId: ID!): Boolean!
  organisationTeam(organisationId: ID!): [OrganisationTeamMember!]!
  organisationInvites(organisationId: ID!): [OrganisationInvite!]!
  organisationInvite(token: String!): OrganisationInvite
  identityOrganisationNotifications(organisationId: ID!, unreadOnly: Boolean, limit: Int): [IdentityOrganisationNotification!]!
  identityOrganisationUnreadCount(organisationId: ID!): Int!
}

type UserConnection {
  edges: [User!]!
  hasNextPage: Boolean!
  endCursor: String
}

type OrganisationConnection {
  edges: [Organisation!]!
  hasNextPage: Boolean!
  endCursor: String
}

# ─── Mutations ────────────────────────────────────────────────────────────────

type Mutation {
  signUp(input: SignUpInput!): SignUpPayload!
  createUser(input: CreateUserInput!): User!
  updateProfile(input: UpdateProfileInput!): User!
  createOrganisation(input: CreateOrganisationInput!): Organisation!
  updateOrganisation(id: ID!, input: UpdateOrganisationInput!): Organisation!
  setOrganisationActive(organisationId: ID!, active: Boolean!): Organisation!
  submitVerification(organisationId: ID!, documentUrls: [String!]!): VerificationRequest!
  followOrganisation(organisationId: ID!): Organisation!
  unfollowOrganisation(organisationId: ID!): Organisation!
  inviteOrganisationMember(organisationId: ID!, email: String!, roles: [String!]!): OrganisationInvite!
  acceptOrganisationInvite(token: String!): Organisation!
  revokeOrganisationInvite(id: ID!): OrganisationInvite!
  resendOrganisationInvite(id: ID!): OrganisationInvite!
  updateOrganisationMemberRoles(organisationId: ID!, userId: ID!, roles: [String!]!): OrganisationTeamMember!
  removeOrganisationMember(organisationId: ID!, userId: ID!): Boolean!
  markIdentityOrganisationNotificationRead(id: ID!): IdentityOrganisationNotification!
  markAllIdentityOrganisationNotificationsRead(organisationId: ID!): Boolean!
}

# ─── Inputs ───────────────────────────────────────────────────────────────────

input UpdateProfileInput {
  name: String
  region: String
  bio: String
  avatarUrl: String
  socialLinks: SocialLinksInput
  privacySettings: ProfilePrivacySettingsInput
  preferences: [String!]
  onboardingCompleted: Boolean
}

input SocialLinksInput {
  whatsapp: String
  instagram: String
  facebook: String
  twitter: String
  website: String
}

input SignUpInput {
  email: String!
  password: String!
  name: String!
}

type SignUpPayload {
  customToken: String!
}

input CreateUserInput {
  name: String!
}

input CreateOrganisationInput {
  name: String!
  description: String
  logoUrl: String
  region: String
  websiteUrl: String
}

input UpdateOrganisationInput {
  name: String
  description: String
  logoUrl: String
  region: String
  websiteUrl: String
  contactEmail: String
  phoneNumber: String
  socialLinks: SocialLinksInput
}

input ProfilePrivacySettingsInput {
  profileVisibility: ProfileVisibility
  showAvatar: Boolean
  showRegion: Boolean
  showBio: Boolean
  showSocialLinks: Boolean
}
