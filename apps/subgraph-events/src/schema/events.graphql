extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.6", import: ["@key", "@external", "@extends", "@provides", "@shareable"])

# ─── Scalars & Enums ──────────────────────────────────────────────────────────

scalar DateTime

enum EventCategory {
  WORSHIP
  WELFARE
  CHARITY
  COMMUNITY
  CONFERENCE
  CULTURAL
  YOUTH
  BIBLE_STUDY
  MUSIC
  OTHER
}

enum EventStatus {
  DRAFT
  PUBLISHED
  CANCELLED
  PAST
}

enum RsvpStage {
  INTERESTED
  SAVED
  CONFIRMED
  WAITLISTED
}

enum EventSort {
  NEWEST
  DATE_ASC
  POPULAR
}

enum LocationType {
  PHYSICAL
  VIRTUAL
  HYBRID
}

enum RecurrenceFrequency {
  WEEKLY
  MONTHLY
}

enum EventUpdateScope {
  THIS_OCCURRENCE
  THIS_AND_FUTURE
  ENTIRE_SERIES
}

# ─── Federation Entity Stubs ──────────────────────────────────────────────────

type Organisation @key(fields: "id") @extends {
  id: ID! @external
  events(limit: Int, after: String): EventConnection!
}

type User @key(fields: "firebaseUid") @extends {
  firebaseUid: String! @external
}

# ─── Entities ─────────────────────────────────────────────────────────────────

type Event @key(fields: "id") {
  id: ID!
  title: String!
  description: String!
  category: EventCategory!
  date: DateTime!
  endDate: DateTime
  location: EventLocation!
  hosts: [Organisation!]!
  region: String!
  rsvpCount: Int!
  interestedCount: Int!
  savedCount: Int!
  confirmedCount: Int!
  capacityLimit: Int
  waitlistCount: Int!
  status: EventStatus!
  imageUrls: [String!]!
  videoUrls: [String!]!
  videoPosterUrls: [String!]!
  isPromoted: Boolean!
  isRecurring: Boolean!
  seriesId: String
  occurrenceNumber: Int
  originalDate: DateTime
  isSeriesException: Boolean!
  series: EventSeries
  mySeriesRsvp: SeriesRSVP
  externalTicketUrl: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

type RecurrenceRule {
  frequency: RecurrenceFrequency!
  interval: Int!
  daysOfWeek: [Int!]!
  dayOfMonth: Int
  timezone: String!
  endsAt: DateTime
  occurrenceCount: Int
}

type EventSeries @key(fields: "id") {
  id: ID!
  title: String!
  recurrence: RecurrenceRule!
  status: EventStatus!
  occurrences(limit: Int, after: String): EventConnection!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type SeriesRSVP @key(fields: "id") {
  id: ID!
  series: EventSeries!
  user: User!
  stage: RsvpStage!
  excludedEventIds: [ID!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type EventLocation @shareable {
  type: LocationType!
  address: String
  city: String
  country: String
  virtualLink: String
}

type RSVP @key(fields: "id") {
  id: ID!
  event: Event!
  user: User!
  stage: RsvpStage!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type EventConnection {
  edges: [Event!]!
  hasNextPage: Boolean!
  endCursor: String
}

type EventOrganisationNotification { id: ID! type: String! title: String! message: String! href: String sourceId: String readAt: DateTime createdAt: DateTime! }

# ─── Queries ──────────────────────────────────────────────────────────────────

type Query {
  event(id: ID!): Event
  events(
    region: String
    search: String
    category: EventCategory
    organisationId: ID
    status: EventStatus
    dateFrom: DateTime
    dateTo: DateTime
    locationType: LocationType
    ticketed: Boolean
    sort: EventSort
    limit: Int
    after: String
    collapseSeries: Boolean
  ): EventConnection!
  featuredEvents(region: String): [Event!]!
  myRsvps(stage: RsvpStage): [RSVP!]!
  eventSeries(id: ID!): EventSeries
  mySeriesRsvp(seriesId: ID!): SeriesRSVP
  eventOrganisationNotifications(organisationId: ID!, unreadOnly: Boolean, limit: Int): [EventOrganisationNotification!]!
  eventOrganisationUnreadCount(organisationId: ID!): Int!
}

# ─── Mutations ────────────────────────────────────────────────────────────────

type Mutation {
  createEvent(input: CreateEventInput!): Event!
  updateEvent(id: ID!, input: UpdateEventInput!, scope: EventUpdateScope = THIS_OCCURRENCE): Event!
  cancelEvent(id: ID!, scope: EventUpdateScope = THIS_OCCURRENCE): Boolean!
  deleteEvent(id: ID!): Boolean!
  rsvpToEvent(eventId: ID!, stage: RsvpStage!): RSVP!
  cancelRsvp(eventId: ID!): Boolean!
  rsvpToSeries(seriesId: ID!, stage: RsvpStage!): SeriesRSVP!
  cancelSeriesRsvp(seriesId: ID!): Boolean!
  markEventOrganisationNotificationRead(id: ID!): EventOrganisationNotification!
  markAllEventOrganisationNotificationsRead(organisationId: ID!): Boolean!
}

# ─── Inputs ───────────────────────────────────────────────────────────────────

input CreateEventInput {
  title: String!
  description: String!
  category: EventCategory!
  date: DateTime!
  endDate: DateTime
  location: EventLocationInput!
  hostOrganisationIds: [ID!]!
  region: String!
  capacityLimit: Int
  imageUrls: [String!]
  videoUrls: [String!]
  videoPosterUrls: [String!]
  isRecurring: Boolean
  recurrence: RecurrenceRuleInput
  externalTicketUrl: String
}

input UpdateEventInput {
  title: String
  description: String
  category: EventCategory
  date: DateTime
  endDate: DateTime
  location: EventLocationInput
  capacityLimit: Int
  imageUrls: [String!]
  videoUrls: [String!]
  videoPosterUrls: [String!]
  status: EventStatus
  externalTicketUrl: String
}

input RecurrenceRuleInput {
  frequency: RecurrenceFrequency!
  interval: Int = 1
  daysOfWeek: [Int!]
  dayOfMonth: Int
  timezone: String!
  endsAt: DateTime
  occurrenceCount: Int
}

input EventLocationInput {
  type: LocationType!
  address: String
  city: String
  country: String
  virtualLink: String
}
