supergraph:
  listen: 0.0.0.0:4000
  introspection: false

include_subgraph_errors:
  all: false

sandbox:
  enabled: false

homepage:
  enabled: false

health_check:
  enabled: true
  listen: 0.0.0.0:8088
  path: /health

cors:
  policies:
    - origins:
        - https://christian-listing.web.app
        - https://christian-listing.firebaseapp.com
        - https://christian-listings-admin.web.app
        - https://christian-listings-admin.firebaseapp.com
      allow_credentials: true
      methods: [GET, POST, OPTIONS]
      allow_headers:
        - content-type
        - authorization
        - x-cl-region
        - x-request-id
        - x-admin-route
        - apollo-require-preflight

headers:
  all:
    request:
      - propagate:
          matching: x-cl-region
      - propagate:
          matching: x-request-id
      - propagate:
          matching: x-admin-route
      - propagate:
          matching: authorization

traffic_shaping:
  all:
    timeout: 30s

override_subgraph_url:
  identity: '${SUBGRAPH_IDENTITY_URL:-http://identity:4001/graphql}'
  events: '${SUBGRAPH_EVENTS_URL:-http://events:4002/graphql}'
  classifieds: '${SUBGRAPH_CLASSIFIEDS_URL:-http://classifieds:4003/graphql}'
  admin: '${SUBGRAPH_ADMIN_URL:-http://admin:4004/graphql}'
