supergraph:
  listen: 0.0.0.0:4000
  introspection: true

include_subgraph_errors:
  all: true

sandbox:
  enabled: true

homepage:
  enabled: false

health_check:
  enabled: true
  listen: 0.0.0.0:8088
  path: /health

cors:
  policies:
    - origins:
        - http://localhost:5173
        - http://localhost:3000
        - https://christian-listing.web.app
        - https://christian-listing.firebaseapp.com
        - https://christian-listings-admin.web.app
        - https://christian-listings-admin.firebaseapp.com
      allow_credentials: true
      methods:
        - GET
        - POST
        - OPTIONS
      allow_headers:
        - content-type
        - authorization
        - x-cl-region
        - x-request-id
        - x-admin-route
        - apollo-require-preflight

headers:
  all:
    request:
      - propagate:
          matching: x-cl-region
      - propagate:
          matching: x-request-id
      - propagate:
          matching: x-admin-route
      - propagate:
          matching: authorization

traffic_shaping:
  all:
    timeout: 30s

override_subgraph_url:
  identity: '${SUBGRAPH_IDENTITY_URL:-http://localhost:4001/graphql}'
  events: '${SUBGRAPH_EVENTS_URL:-http://localhost:4002/graphql}'
  classifieds: '${SUBGRAPH_CLASSIFIEDS_URL:-http://localhost:4003/graphql}'
  admin: '${SUBGRAPH_ADMIN_URL:-http://localhost:4004/graphql}'
