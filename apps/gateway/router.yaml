supergraph:
  introspection: true

sandbox:
  enabled: true

homepage:
  enabled: false

health_check:
  enabled: true
  listen: 0.0.0.0:8088
  path: /health

cors:
  policies:
    - origins:
        - http://localhost:5173
        - http://localhost:3000
      allow_credentials: true
      methods:
        - GET
        - POST
        - OPTIONS
      allow_headers:
        - content-type
        - authorization
        - x-cl-region
        - x-request-id
        - apollo-require-preflight

headers:
  all:
    request:
      - propagate:
          matching: x-cl-region
      - propagate:
          matching: x-request-id
      - propagate:
          matching: authorization

traffic_shaping:
  all:
    timeout: 30s

override_subgraph_url:
  identity: http://localhost:4001/graphql
  events: http://localhost:4002/graphql
  classifieds: http://localhost:4003/graphql
  admin: http://localhost:4004/graphql
