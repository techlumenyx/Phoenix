version: '3.9'

services:
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.router
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=production
      - PORT=4000
      - SUBGRAPH_IDENTITY_URL=http://identity:4001/graphql
      - SUBGRAPH_EVENTS_URL=http://events:4002/graphql
      - SUBGRAPH_CLASSIFIEDS_URL=http://classifieds:4003/graphql
      - SUBGRAPH_ADMIN_URL=http://admin:4004/graphql
    depends_on:
      identity:
        condition: service_healthy
      events:
        condition: service_healthy
      classifieds:
        condition: service_healthy
      admin:
        condition: service_healthy

  identity:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
      args:
        APP_NAME: subgraph-identity
    ports:
      - '4001:4001'
    environment:
      - NODE_ENV=production
      - PORT=4001
      - MONGO_URI=${MONGO_URI}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - ADMIN_INTERNAL_URL=http://admin:4004
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4001/health']
      interval: 10s
      timeout: 5s
      retries: 5

  events:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
      args:
        APP_NAME: subgraph-events
    ports:
      - '4002:4002'
    environment:
      - NODE_ENV=production
      - PORT=4002
      - MONGO_URI=${MONGO_URI}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4002/health']
      interval: 10s
      timeout: 5s
      retries: 5

  classifieds:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
      args:
        APP_NAME: subgraph-classifieds
    ports:
      - '4003:4003'
    environment:
      - NODE_ENV=production
      - PORT=4003
      - MONGO_URI=${MONGO_URI}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - ADMIN_INTERNAL_URL=http://admin:4004
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4003/health']
      interval: 10s
      timeout: 5s
      retries: 5

  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
      args:
        APP_NAME: subgraph-admin
    ports:
      - '4004:4004'
    environment:
      - NODE_ENV=production
      - PORT=4004
      - MONGO_URI=${MONGO_URI}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - CLASSIFIEDS_INTERNAL_URL=http://classifieds:4003
      - IDENTITY_INTERNAL_URL=http://identity:4001
      - EVENTS_INTERNAL_URL=http://events:4002
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - ADMIN_ALLOWED_ORIGINS=${ADMIN_ALLOWED_ORIGINS}
      - ADMIN_RATE_LIMIT_PER_MINUTE=${ADMIN_RATE_LIMIT_PER_MINUTE:-120}
      - APP_VERSION=${APP_VERSION:-development}
      - GIT_SHA=${GIT_SHA:-local}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4004/health']
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        APP_NAME: christian-listing
    ports:
      - '80:80'
    depends_on:
      - gateway

  admin-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        APP_NAME: cl-admin
    ports:
      - '3001:80'
    depends_on:
      - gateway
