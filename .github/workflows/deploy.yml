name: Deploy

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  deploy-christian-listing:
    name: Build & Deploy christian-listing
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Firebase
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" | base64 -d > /tmp/sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json" >> $GITHUB_ENV

      - name: Build christian-listing (production)
        run: npx nx build christian-listing --configuration=production
        env:
          CL_GRAPHQL_URL: ${{ secrets.CL_GRAPHQL_URL }}
          CL_IDENTITY_MEDIA_URL: ${{ vars.CL_IDENTITY_MEDIA_URL }}
          CL_EVENTS_MEDIA_URL: ${{ vars.CL_EVENTS_MEDIA_URL }}
          CL_CLASSIFIEDS_MEDIA_URL: ${{ vars.CL_CLASSIFIEDS_MEDIA_URL }}
          CL_FIREBASE_API_KEY: ${{ secrets.CL_FIREBASE_API_KEY }}
          CL_FIREBASE_AUTH_DOMAIN: ${{ secrets.CL_FIREBASE_AUTH_DOMAIN }}
          CL_FIREBASE_PROJECT_ID: ${{ secrets.CL_FIREBASE_PROJECT_ID }}
          CL_FIREBASE_STORAGE_BUCKET: ${{ secrets.CL_FIREBASE_STORAGE_BUCKET }}
          CL_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.CL_FIREBASE_MESSAGING_SENDER_ID }}
          CL_FIREBASE_APP_ID: ${{ secrets.CL_FIREBASE_APP_ID_CL }}

      - name: Deploy to Firebase Hosting (christian-listing)
        run: |
          set +e
          output=$(npx firebase deploy --only hosting:christian-listing --project ${{ vars.FIREBASE_PROJECT_ID }} 2>&1)
          exit_code=$?
          set -e
          echo "$output"
          if [ $exit_code -ne 0 ] && echo "$output" | grep -q "current active version"; then
            echo "Nothing to deploy — christian-listing is already up-to-date"
            exit 0
          fi
          exit $exit_code

  deploy-cl-admin:
    name: Build & Deploy cl-admin
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Firebase
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" | base64 -d > /tmp/sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json" >> $GITHUB_ENV

      - name: Build cl-admin (production)
        run: npx nx build cl-admin --configuration=production
        env:
          CL_GRAPHQL_URL: ${{ secrets.CL_GRAPHQL_URL }}
          CL_ADMIN_MEDIA_URL: ${{ vars.CL_ADMIN_MEDIA_URL }}
          CL_FIREBASE_API_KEY: ${{ secrets.CL_FIREBASE_API_KEY }}
          CL_FIREBASE_AUTH_DOMAIN: ${{ secrets.CL_FIREBASE_AUTH_DOMAIN }}
          CL_FIREBASE_PROJECT_ID: ${{ secrets.CL_FIREBASE_PROJECT_ID }}
          CL_FIREBASE_STORAGE_BUCKET: ${{ secrets.CL_FIREBASE_STORAGE_BUCKET }}
          CL_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.CL_FIREBASE_MESSAGING_SENDER_ID }}
          CL_FIREBASE_APP_ID: ${{ secrets.CL_FIREBASE_APP_ID_ADMIN }}

      - name: Deploy to Firebase Hosting (cl-admin)
        run: |
          set +e
          output=$(npx firebase deploy --only hosting:christian-listings-admin --project ${{ vars.FIREBASE_PROJECT_ID }} 2>&1)
          exit_code=$?
          set -e
          echo "$output"
          if [ $exit_code -ne 0 ] && echo "$output" | grep -q "current active version"; then
            echo "Nothing to deploy — cl-admin is already up-to-date"
            exit 0
          fi
          exit $exit_code

  build-and-push:
    name: Build & Push Docker Images
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - app: gateway
            dockerfile: docker/Dockerfile.router
          - app: subgraph-identity
            dockerfile: docker/Dockerfile.node
          - app: subgraph-events
            dockerfile: docker/Dockerfile.node
          - app: subgraph-classifieds
            dockerfile: docker/Dockerfile.node
          - app: subgraph-admin
            dockerfile: docker/Dockerfile.node

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # apps/gateway/supergraph.graphql is gitignored (composed, not committed),
      # so the gateway image needs it regenerated before the Docker build can COPY it.
      - name: Compose supergraph
        if: matrix.app == 'gateway'
        env:
          APOLLO_ELV2_LICENSE: accept
        run: |
          npm install -g @apollo/rover
          rover supergraph compose --config rover.yaml --output apps/gateway/supergraph.graphql

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: APP_NAME=${{ matrix.app }}
          push: true
          tags: |
            ghcr.io/techlumenyx/phoenix/${{ matrix.app }}:latest
            ghcr.io/techlumenyx/phoenix/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  deploy-backend:
    name: Deploy Backend to Hetzner
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd /opt/christian-listings
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml --env-file .env pull
            docker compose -f docker-compose.prod.yml --env-file .env up -d
            docker image prune -f

      - name: Smoke test — verify GraphQL endpoint
        run: |
          echo "Waiting 20s for containers to stabilise..."
          sleep 20
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://christian-listings.duckdns.org/ \
            -H "Content-Type: application/json" \
            -d '{"query":"{__typename}"}' \
            --max-time 15)
          if [ "$status" != "200" ]; then
            echo "Smoke test FAILED — HTTP $status from https://christian-listings.duckdns.org/"
            exit 1
          fi
          echo "Smoke test passed — HTTP 200"
