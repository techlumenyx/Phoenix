name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  deploy-christian-listing:
    name: Build & Deploy christian-listing
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Firebase
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" | base64 -d > /tmp/sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json" >> $GITHUB_ENV

      - name: Build christian-listing (production)
        run: npx nx build christian-listing --configuration=production
        env:
          CL_GRAPHQL_URL: ${{ secrets.CL_GRAPHQL_URL }}
          CL_FIREBASE_API_KEY: ${{ secrets.CL_FIREBASE_API_KEY }}
          CL_FIREBASE_AUTH_DOMAIN: ${{ secrets.CL_FIREBASE_AUTH_DOMAIN }}
          CL_FIREBASE_PROJECT_ID: ${{ secrets.CL_FIREBASE_PROJECT_ID }}
          CL_FIREBASE_STORAGE_BUCKET: ${{ secrets.CL_FIREBASE_STORAGE_BUCKET }}
          CL_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.CL_FIREBASE_MESSAGING_SENDER_ID }}
          CL_FIREBASE_APP_ID: ${{ secrets.CL_FIREBASE_APP_ID_CL }}

      - name: Deploy to Firebase Hosting (christian-listing)
        run: |
          output=$(npx firebase deploy --only hosting:christian-listing --project ${{ vars.FIREBASE_PROJECT_ID }} 2>&1)
          exit_code=$?
          echo "$output"
          if [ $exit_code -ne 0 ] && echo "$output" | grep -q "current active version"; then
            echo "Nothing to deploy — christian-listing is already up-to-date"
            exit 0
          fi
          exit $exit_code

  deploy-cl-admin:
    name: Build & Deploy cl-admin
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Firebase
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" | base64 -d > /tmp/sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json" >> $GITHUB_ENV

      - name: Build cl-admin (production)
        run: npx nx build cl-admin --configuration=production
        env:
          CL_GRAPHQL_URL: ${{ secrets.CL_GRAPHQL_URL }}
          CL_FIREBASE_API_KEY: ${{ secrets.CL_FIREBASE_API_KEY }}
          CL_FIREBASE_AUTH_DOMAIN: ${{ secrets.CL_FIREBASE_AUTH_DOMAIN }}
          CL_FIREBASE_PROJECT_ID: ${{ secrets.CL_FIREBASE_PROJECT_ID }}
          CL_FIREBASE_STORAGE_BUCKET: ${{ secrets.CL_FIREBASE_STORAGE_BUCKET }}
          CL_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.CL_FIREBASE_MESSAGING_SENDER_ID }}
          CL_FIREBASE_APP_ID: ${{ secrets.CL_FIREBASE_APP_ID_ADMIN }}

      - name: Deploy to Firebase Hosting (cl-admin)
        run: |
          output=$(npx firebase deploy --only hosting:christian-listings-admin --project ${{ vars.FIREBASE_PROJECT_ID }} 2>&1)
          exit_code=$?
          echo "$output"
          if [ $exit_code -ne 0 ] && echo "$output" | grep -q "current active version"; then
            echo "Nothing to deploy — cl-admin is already up-to-date"
            exit 0
          fi
          exit $exit_code
