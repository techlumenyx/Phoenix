version: "3.9"

# Production compose — pulls pre-built images from GHCR.
# Never runs `docker build`. The server only downloads and runs.
# Images are built and pushed by GitHub Actions on every push to main.

services:
  gateway:
    image: ghcr.io/techlumenyx/phoenix/gateway:latest
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - SUBGRAPH_IDENTITY_URL=http://identity:4001/graphql
      - SUBGRAPH_EVENTS_URL=http://events:4002/graphql
      - SUBGRAPH_CLASSIFIEDS_URL=http://classifieds:4003/graphql
      - SUBGRAPH_ADMIN_URL=http://admin:4004/graphql
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8088/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      identity:
        condition: service_healthy
      events:
        condition: service_healthy
      classifieds:
        condition: service_healthy
      admin:
        condition: service_healthy
    restart: unless-stopped

  identity:
    image: ghcr.io/techlumenyx/phoenix/subgraph-identity:latest
    environment:
      - NODE_ENV=production
      - PORT=4001
      - MONGO_URI=${MONGO_URI}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  events:
    image: ghcr.io/techlumenyx/phoenix/subgraph-events:latest
    environment:
      - NODE_ENV=production
      - PORT=4002
      - MONGO_URI=${MONGO_URI}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  classifieds:
    image: ghcr.io/techlumenyx/phoenix/subgraph-classifieds:latest
    environment:
      - NODE_ENV=production
      - PORT=4003
      - MONGO_URI=${MONGO_URI}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  admin:
    image: ghcr.io/techlumenyx/phoenix/subgraph-admin:latest
    environment:
      - NODE_ENV=production
      - PORT=4004
      - MONGO_URI=${MONGO_URI}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # worker:
  #   image: ghcr.io/techlumenyx/phoenix/worker:latest
  #   environment:
  #     - NODE_ENV=production
  #     - REDIS_URL=redis://redis:6379
  #     - MONGO_URI=${MONGO_URI}
  #     - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON}
  #   depends_on:
  #     - redis
  #   restart: unless-stopped
  # ↑ Uncomment when apps/worker is scaffolded

volumes:
  redis_data:
